displayName: Static
type: middleware

import: github.com/hanzoai/static

summary: 'Static file server middleware for Hanzo Ingress'

testData:
  root: ./tmp/static-test/
  enableDirectoryListing: false
  indexFiles:
    - index.html
    - index.htm
  spaMode: false
  spaIndex: index.html
  errorPage404: ""
  cacheControl:
    ".html": "max-age=3600"
    ".css": "max-age=86400"
    ".js": "max-age=86400"
    "*": "max-age=3600"
